<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
        }

        /* NAVBAR */
        .navbar {
            background-color: #861F41;
            color: white;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar button {
            margin-left: 10px;
            padding: 8px 14px;
            border: none;
            background-color: white;
            color: #861F41;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* CONTAINER */
        .container {
            width: 50%;
            margin: 40px auto;
        }

        /* CARD */
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        h2 {
            margin-top: 0;
        }

        /* FORM */
        .form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .form button {
            background-color: #861F41;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .form button:hover {
            background-color: #6e1834;
        }

        .section-title {
            margin-bottom: 15px;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>Admin Panel</h2>
    <div>
        <a href="/"><button>Home</button></a>
        <a href="/account"><button>Account</button></a>
        <a href="/logout"><button>Logout</button></a>
    </div>
</div>

<div class="container">

    <div class="card">
        <h2 class="section-title">Create New User</h2>

        <form class="form" action="/admin/create_user" method="POST">
            <input name="first" placeholder="First Name" required>
            <input name="last" placeholder="Last Name" required>
            <input name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Create User</button>
        </form>
    </div>

</div>

</body>
</html>
