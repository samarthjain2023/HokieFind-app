<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="stack" style="gap:14px">
    <div class="label">Logo system</div>
    <div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <img src="../assets/logo.svg" style="width:200px">
        <div class="mono" style="color:#6b6468">logo.svg · on light</div>
      </div>
      <div style="background:#861F41;padding:12px 16px;border-radius:8px;display:flex;flex-direction:column;align-items:center;gap:8px">
        <img src="../assets/logo-inverse.svg" style="width:200px">
        <div class="mono" style="color:#f6e4ea">logo-inverse.svg · on maroon</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <img src="../assets/mark.svg" style="width:64px;height:64px;border-radius:10px">
        <div class="mono" style="color:#6b6468">mark.svg · 64px</div>
      </div>
    </div>
  </div>
</div>
</body></html>
