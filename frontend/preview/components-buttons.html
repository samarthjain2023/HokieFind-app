<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<style>
.btn { font-family: var(--font-sans); font-size: 15px; font-weight: 700; border-radius: 6px; padding: 10px 16px; border: none; cursor: pointer; transition: background-color 120ms ease; }
.btn-primary { background: #861F41; color: #fff; }
.btn-primary:hover { background: #6e1834; }
.btn-secondary { background: #fff; color: #861F41; border: 1px solid #d6d2d4; }
.btn-accent { background: #E87722; color: #fff; }
.btn-ghost { background: transparent; color: #861F41; }
.btn-danger { background: #fff; color: #b00020; border: 1px solid #f0c8c8; }
</style>
</head>
<body>
<div class="card">
  <div class="stack" style="gap:14px">
    <div class="label">Buttons</div>
    <div class="row" style="gap:10px">
      <button class="btn btn-primary">Add Listing</button>
      <button class="btn btn-primary" style="background:#6e1834">Hover</button>
      <button class="btn btn-secondary">Account</button>
      <button class="btn btn-accent">Submit Claim</button>
      <button class="btn btn-ghost">Back to Listings</button>
      <button class="btn btn-danger">Delete</button>
    </div>
    <div class="mono" style="color:#6b6468">Primary = maroon · Accent (orange) reserved for Claim CTA only · All radius 6</div>
  </div>
</div>
</body></html>
