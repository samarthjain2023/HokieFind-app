<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css">
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="card">
  <div class="stack" style="gap:14px">
    <div class="label">Iconography — Lucide (CDN, flagged substitution)</div>
    <div style="display:grid;grid-template-columns:repeat(8,1fr);gap:14px 10px;color:#4a4447">
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="search"></i><span class="mono" style="font-size:10px">search</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="map-pin"></i><span class="mono" style="font-size:10px">map-pin</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="upload"></i><span class="mono" style="font-size:10px">upload</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="user"></i><span class="mono" style="font-size:10px">user</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="shield"></i><span class="mono" style="font-size:10px">shield</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="bar-chart-3"></i><span class="mono" style="font-size:10px">chart</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="check-circle-2"></i><span class="mono" style="font-size:10px">check</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="alert-circle"></i><span class="mono" style="font-size:10px">alert</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="trash-2"></i><span class="mono" style="font-size:10px">trash</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="pencil"></i><span class="mono" style="font-size:10px">edit</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="arrow-right"></i><span class="mono" style="font-size:10px">arrow</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="log-out"></i><span class="mono" style="font-size:10px">logout</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="image"></i><span class="mono" style="font-size:10px">image</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="package"></i><span class="mono" style="font-size:10px">item</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="calendar"></i><span class="mono" style="font-size:10px">date</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><i data-lucide="hand"></i><span class="mono" style="font-size:10px">claim</span></div>
    </div>
  </div>
</div>
<script>lucide.createIcons();</script>
</body></html>
