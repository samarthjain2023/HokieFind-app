<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="stack">
    <div class="label">Semantic — status colors</div>
    <div class="row" style="gap:10px">
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div class="swatch" style="background:#1f7a3a;height:40px"><span class="swatch-label">Success 700</span></div>
        <div class="swatch" style="background:#e6ffe6;height:32px;border:1px solid #cceaca"><span class="swatch-label" style="color:#007a00;mix-blend-mode:normal">Success 100</span></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div class="swatch" style="background:#b26900;height:40px"><span class="swatch-label">Warn 700</span></div>
        <div class="swatch" style="background:#fff2d9;height:32px;border:1px solid #f0e0b8"><span class="swatch-label" style="color:#8a4d00;mix-blend-mode:normal">Warn 100</span></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div class="swatch" style="background:#b00020;height:40px"><span class="swatch-label">Error 700</span></div>
        <div class="swatch" style="background:#ffe5e5;height:32px;border:1px solid #f0c8c8"><span class="swatch-label" style="color:#b00020;mix-blend-mode:normal">Error 100</span></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px">
        <div class="swatch" style="background:#1f5a9e;height:40px"><span class="swatch-label">Info 700</span></div>
        <div class="swatch" style="background:#dfeaf9;height:32px;border:1px solid #bfd2ee"><span class="swatch-label" style="color:#1f5a9e;mix-blend-mode:normal">Info 100</span></div>
      </div>
    </div>
    <div style="font-size:12px;color:#6b6468">Error/success 100s match existing .error / .success message backgrounds in the codebase.</div>
  </div>
</div>
</body></html>
