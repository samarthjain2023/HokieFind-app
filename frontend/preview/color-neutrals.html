<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="stack">
    <div class="label">Neutrals — Hokie Stone scale</div>
    <div class="row" style="gap:6px">
      <div style="flex:1"><div class="swatch" style="background:#1a1718;height:56px"><span class="swatch-label">900</span></div></div>
      <div style="flex:1"><div class="swatch" style="background:#2f2a2c"><span class="swatch-label">800</span></div></div>
      <div style="flex:1"><div class="swatch" style="background:#4a4447"><span class="swatch-label">700</span></div></div>
      <div style="flex:1"><div class="swatch" style="background:#6b6468"><span class="swatch-label">600</span></div></div>
      <div style="flex:1"><div class="swatch" style="background:#8a8487"><span class="swatch-label">500</span></div></div>
      <div style="flex:1"><div class="swatch" style="background:#b4afb1"><span class="swatch-label">400</span></div></div>
      <div style="flex:1"><div class="swatch" style="background:#d6d2d4"><span class="swatch-label" style="color:#1a1718;mix-blend-mode:normal">300</span></div></div>
      <div style="flex:1"><div class="swatch" style="background:#e8e5e6"><span class="swatch-label" style="color:#1a1718;mix-blend-mode:normal">200</span></div></div>
      <div style="flex:1"><div class="swatch" style="background:#f3f1f2"><span class="swatch-label" style="color:#1a1718;mix-blend-mode:normal">100</span></div></div>
      <div style="flex:1"><div class="swatch" style="background:#faf9f9;border:1px solid #e8e5e6"><span class="swatch-label" style="color:#1a1718;mix-blend-mode:normal">50</span></div></div>
    </div>
    <div style="font-size:12px;color:#6b6468">Warm grays, hue-shifted toward maroon. Body bg = <span class="mono">#F3F4F6</span></div>
  </div>
</div>
</body></html>
