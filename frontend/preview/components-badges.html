<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="stack" style="gap:12px">
    <div class="label">Status badges</div>
    <div class="row" style="gap:8px">
      <span style="padding:4px 10px;border-radius:999px;background:#e6ffe6;color:#1f7a3a;font-size:12px;font-weight:600">● Returned</span>
      <span style="padding:4px 10px;border-radius:999px;background:#fff2d9;color:#8a4d00;font-size:12px;font-weight:600">● Pending</span>
      <span style="padding:4px 10px;border-radius:999px;background:#dfeaf9;color:#1f5a9e;font-size:12px;font-weight:600">● In review</span>
      <span style="padding:4px 10px;border-radius:999px;background:#ffe5e5;color:#b00020;font-size:12px;font-weight:600">● Rejected</span>
      <span style="padding:4px 10px;border-radius:999px;background:#f6e4ea;color:#861F41;font-size:12px;font-weight:600">● Active listing</span>
      <span style="padding:4px 10px;border-radius:999px;background:#fde6d2;color:#8a3d05;font-size:12px;font-weight:600">● New claim</span>
    </div>
    <div class="mono" style="color:#6b6468">Pill · 12px · 600 weight · status dot + label</div>
  </div>
</div>
</body></html>
