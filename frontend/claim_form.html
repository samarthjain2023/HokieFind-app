<!DOCTYPE html>
<html>
    <head>
        <title>Claim Item</title>

        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f3f4f6;
                margin: 0;
            }

            .navbar {
                background-color: #861F41;
                color: white;
                padding: 16px 40px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .navbar button {
                margin-left: 10px;
                padding: 8px 14px;
                border: none;
                background-color: white;
                color: #861F41;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
            }

            .container {
                width: 70%;
                margin: 30px auto;
            }

            .card {
                background: white;
                padding: 20px;
                border-radius: 10px;
                margin-bottom: 25px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            }

            textarea {
                width: 100%;
                height: 120px;
                padding: 10px;
                margin-bottom: 10px;
                border-radius: 6px;
                border: 1px solid #ccc;
                font-family: Arial, sans-serif;
                box-sizing: border-box;
            }

            button.submit {
                background-color: #861F41;
                color: white;
                border: none;
                padding: 10px 16px;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
            }

            .actions a {
                margin-right: 10px;
                color: #861F41;
                text-decoration: none;
                font-weight: bold;
            }

            .msg {
                padding: 10px;
                margin-bottom: 15px;
                border-radius: 6px;
            }

            .error {
                background-color: #ffe5e5;
                color: #b00020;
            }
        </style>
    </head>

    <body>
        <div class="navbar">
            <h2>HokieFind</h2>
            <div>
                <a href="/"><button>Home</button></a>
                <a href="/account"><button>Account</button></a>
                <a href="/logout"><button>Logout</button></a>
            </div>
        </div>

        <div class="container">
            <h1>Claim Item</h1>

            {% if request.args.get('error') == 'empty' %}
                <div class="msg error">Please explain why this item is yours.</div>
            {% endif %}

            <div class="card">
                <h2>Submit a Claim</h2>

                <form method="POST">
                    <textarea name="message" placeholder="Explain why this item is yours" required></textarea>
                    <button class="submit" type="submit">Submit Claim</button>
                </form>

                <br>

                <div class="actions">
                    <a href="/">Back to Listings</a>
                </div>
            </div>
        </div>
    </body>
</html>
