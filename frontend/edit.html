<!DOCTYPE html>
<html>
<head>
    <title>Edit Listing</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
        }

        /* NAVBAR */
        .navbar {
            background-color: #861F41;
            color: white;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar button {
            margin-left: 10px;
            padding: 8px 14px;
            border: none;
            background-color: white;
            color: #861F41;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* CONTAINER */
        .container {
            width: 50%;
            margin: 40px auto;
        }

        /* CARD */
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        h1 {
            margin-top: 0;
        }

        /* FORM */
        .form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        .form button {
            background-color: #861F41;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .form button:hover {
            background-color: #6e1834;
        }

        .back {
            margin-top: 15px;
            display: inline-block;
            color: #861F41;
            text-decoration: none;
            font-weight: bold;
        }

        .back:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>HokieFind</h2>
    <div>
        <a href="/"><button>Home</button></a>
        <a href="/account"><button>Account</button></a>
        <a href="/logout"><button>Logout</button></a>
    </div>
</div>

<div class="container">

    <div class="card">
        <h1>Edit Listing</h1>

        <form class="form" method="POST" action="/update/{{ listing[0] }}">
            
            <label>Location</label>
            <input name="location" value="{{ listing[3] }}" required>

            <label>Image URL</label>
            <input name="image" value="{{ listing[6] }}">

            <button type="submit">Update Listing</button>
        </form>

        <a class="back" href="/">← Back to Listings</a>
    </div>

</div>

</body>
</html>
