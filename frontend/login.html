<!DOCTYPE html>
    <html>
        <head>
            <title>Login</title>
            <style>
                body {
                    font-family: Arial, sans-serif;
                    background-color: #f3f4f6;
                    margin: 0;
                }

                .navbar {
                    background-color: #861F41;
                    color: white;
                    padding: 16px 40px;
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                }

                .navbar button {
                    margin-left: 10px;
                    padding: 8px 14px;
                    border: none;
                    background-color: white;
                    color: #861F41;
                    border-radius: 6px;
                    cursor: pointer;
                    font-weight: bold;
                }

                .container {
                    width: 50%;
                    margin: 40px auto;
                }

                .card {
                    background: white;
                    padding: 25px;
                    border-radius: 10px;
                    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
                }

                h2 {
                    margin-top: 0;
                }

                .form input {
                    width: 100%;
                    padding: 10px;
                    margin-bottom: 12px;
                    border-radius: 6px;
                    border: 1px solid #ccc;
                    box-sizing: border-box;
                }

                .form button {
                    background-color: #861F41;
                    color: white;
                    border: none;
                    padding: 10px 16px;
                    border-radius: 6px;
                    cursor: pointer;
                    font-weight: bold;
                }

                .form button:hover {
                    background-color: #6e1834;
                }

                .link {
                    margin-top: 15px;
                }

                .link a {
                    color: #861F41;
                    font-weight: bold;
                    text-decoration: none;
                }
            </style>
        </head>

        <body>
            <div class="navbar">
                <h2>Login</h2>
                <div>
                    <a href="/signup"><button>Sign Up</button></a>
                </div>
            </div>

            <div class="container">
                <div class="card">
                    <h2>Welcome Back</h2>

                    <form class="form" method="POST">
                        <input name="email" placeholder="Email" required>
                        <input type="password" name="password" placeholder="Password" required>

                        <button type="submit">Login</button>
                    </form>

                    <div class="link">
                        Don't have an account? <a href="/signup">Sign Up</a>
                    </div>
                </div>
            </div>
        </body>
    </html>
