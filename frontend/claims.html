<!DOCTYPE html>
<html>
    <head>
        <title>Claims</title>

        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f3f4f6;
                margin: 0;
            }

            .navbar {
                background-color: #861F41;
                color: white;
                padding: 16px 40px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .navbar button {
                margin-left: 10px;
                padding: 8px 14px;
                border: none;
                background-color: white;
                color: #861F41;
                border-radius: 6px;
                cursor: pointer;
                font-weight: bold;
            }

            .container {
                width: 70%;
                margin: 30px auto;
            }

            .card {
                background: white;
                padding: 20px;
                border-radius: 10px;
                margin-bottom: 25px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            }

            .claim {
                border-bottom: 1px solid #eee;
                padding: 15px 0;
            }

            .claim:last-child {
                border-bottom: none;
            }

            .title {
                font-weight: bold;
                font-size: 18px;
                color: #222;
            }

            .desc {
                color: #444;
                margin-top: 6px;
            }

            .date {
                color: #777;
                margin-top: 6px;
                font-size: 14px;
            }

            .actions a {
                margin-right: 10px;
                color: #861F41;
                text-decoration: none;
                font-weight: bold;
            }
        </style>
    </head>

    <body>
        <div class="navbar">
            <h2>HokieFind</h2>
            <div>
                <a href="/"><button>Home</button></a>
                <a href="/account"><button>Account</button></a>
                <a href="/logout"><button>Logout</button></a>
            </div>
        </div>

        <div class="container">
            <h1>Claims</h1>

            <div class="card">
                <h2>Submitted Claims</h2>

                {% if claims %}
                    {% for claim in claims %}
                        <div class="claim">
                            <div class="title">{{ claim[1] }} {{ claim[2] }}</div>
                            <div class="desc">{{ claim[3] }}</div>
                            <div class="date">{{ claim[4] }}</div>
                        </div>
                    {% endfor %}
                {% else %}
                    <p>No claims yet.</p>
                {% endif %}

                <br>

                <div class="actions">
                    <a href="/">Back to Listings</a>
                </div>
            </div>
        </div>
    </body>
</html>
